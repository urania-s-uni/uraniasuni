<script>
const WADIZ_URL = 'https://www.wadiz.kr/web/wcomingsoon/rwd/389397';

const items=[
  {t:"도파민 좀비",b:"숏폼을 보기 시작하면 정신 차렸을 때 30분이 사라져 있다.",types:["공회전형","기생부하형"]},
  {t:"장비병",b:"시작하기 전에 장비나 책부터 산다. 제대로 쓴 적은 거의 없다.",types:["과적형"]},
  {t:"완벽주의 핑계",b:"\"제대로 할 거 아니면 안 하는 게 나아.\" 사실은 시작이 두려운 것이다.",types:["과적형","대포형"]},
  {t:"아가리 파이터",b:"\"나 이거 할 거야\"라고 말하지만 실제 결과물은 0이다.",types:["공회전형","활성화에너지 미달형"]},
  {t:"작심삼일",b:"새해 목표, 월초 계획. 3일 이상 지속된 루틴이 지금 하나도 없다.",types:["활성화에너지 미달형"]},
  {t:"학습 중독",b:"강의와 책은 열심히 듣는다. 듣는 순간의 고양감만 즐길 뿐 삶에 적용한 건 없다.",types:["과적형","공회전형"]},
  {t:"알림 지옥",b:"카카오톡, 앱 푸시에 빨간 숫자가 99+ 떠 있지만 무감각하다.",types:["기생부하형"]},
  {t:"멀티태스킹의 덫",b:"밥 먹으며 유튜브 보고, 일하며 카톡한다. 산만한 상태가 기본값이다.",types:["공회전형","감속재형"]},
  {t:"만성 피로",b:"자고 일어났을 때 \"개운하다\"보다 \"더 자고 싶다\"가 지배적이다.",types:["기생부하형"]},
  {t:"비교 지옥",b:"SNS 속 타인의 삶과 나의 현실을 비교하며 스스로 비참해지는 감정이 자주 든다.",types:["열평형형"]},
  {t:"결정 장애",b:"점심 메뉴부터 진로까지, 선택하는 데 과도한 에너지를 쓰고 결국 남의 의견을 따른다.",types:["과적형","감속재형"]},
  {t:"벼락치기 의존",b:"마감이 코앞에 닥쳐 심장이 쫄깃해져야만 비로소 일에 착수한다.",types:["활성화에너지 미달형"]},
  {t:"만성 지각",b:"약속 시간에 5~10분씩 늦으며 \"거의 다 왔어\"라고 거짓말한다.",types:["미루기형"]},
  {t:"과거 집착",b:"\"그때 그걸 했어야 했는데.\" 이미 지나간 일을 계속 되감기한다.",types:["열평형형","미루기형"]},
  {t:"걱정의 늪",b:"일어나지 않은 일에 대한 걱정 때문에 정작 지금 해야 할 일에 집중을 못 한다.",types:["감속재형"]},
  {t:"요행 대기",b:"언젠가 기회가 올 거라고 생각한다. 한 방이 있을 것 같다. 근데 준비는 안 하고 있다.",types:["요행형"]},
  {t:"혼자 버팀",b:"도움을 받으면 빚지는 것 같다. 연결하면 더 빠를 것 같은데 혼자 버티고 있다.",types:["고립계형"]},
  {t:"나중에 하면 돼",b:"조금 더 여유가 생기면 시작하려고 한다. 그 나중이 온 적이 없다.",types:["미루기형"]},
  {t:"조용한 공포",b:"분명히 하고 있는데 달라진 게 없다. 이게 맞는 건지 확인할 방법이 없어서 그냥 하고 있다.",types:["임계점형","잠열 구간형"]},
  {t:"중간 점검 중독",b:"잘 되고 있는지 자꾸 확인하고 싶어진다. 확인할 때마다 불안해지는데 또 확인한다.",types:["감속재형","임계점형"]},
  {t:"비교 자동화",b:"SNS를 안 보려고 해도 결국 본다. 보고 나면 내가 너무 느린 것 같다.",types:["임계점형","열평형형"]},
  {t:"멈추면 무너질 것 같은 느낌",b:"쉬면 다 리셋될 것 같아서 쉬지 못한다. 쉬는 동안에도 뭔가 해야 할 것 같다.",types:["연쇄반응형","잠열 구간형"]},
  {t:"여기까지 왔는데",b:"포기하자니 지금까지 한 게 아깝고, 계속하자니 확신이 없다. 그래서 그냥 하고 있다.",types:["임계점형","잠열 구간형"]},
  {t:"성공 공포증",b:"뭔가 되고 있는데 언제 다시 멈출지 모른다는 생각이 먼저 든다.",types:["연쇄반응형"]},
  {t:"가속 불안",b:"잘 되고 있는데 오히려 예전보다 더 긴장된다. 잘 될수록 잃을 게 많아지는 것 같다.",types:["연쇄반응형"]},
];

const types={
  "공회전형":{zone:"ZONE B — 공회전 구간",tag:"열심히 하는데 아무 데도 안 간다",desc:"유튜브도 하고 싶고, 부업도 해보고 싶고, 자격증도 따야 하고, 운동도 시작해야 한다.\n전부 중요하다. 전부 하고 있다. 근데 하나도 제대로 되는 게 없다.\n\n하루가 끝나면 분명히 바빴는데 뭘 했는지 모르겠다.\n열심히 한다고 말하는데 보여줄 게 없다.\n게으른 것도 아닌데 결과가 없는 게 더 억울하다.\n\n문제는 노력이 아니다.\n노력이 너무 많은 곳으로 흩어지고 있는 것이다.",ch:"Ch11 — 임계 질량을 설계하라",q:"전부 중요하면 아무것도 중요하지 않다. 하나만 남겨라."},
  "과적형":{zone:"ZONE B — 공회전 구간",tag:"꿈은 큰데 시작을 못 한다",desc:"하고 싶은 건 분명하다. 방향도 있다. 근데 시작이 안 된다.\n강의를 하나 더 들었다. 책을 한 권 더 읽었다. 노트에 계획을 더 정교하게 썼다.\n근데 여전히 시작을 못 했다.\n\n준비할수록 오히려 더 못 할 것 같은 느낌이 든다.\n완벽하게 시작하고 싶은데 완벽한 타이밍이 오질 않는다.\n\n사실 알고 있다.\n준비가 부족한 게 아니라는 걸. 시작이 두려운 것이다.",ch:"Ch5, Ch6 — 질량을 줄여라 / 점화하라",q:"완벽한 준비를 기다리는 동안, 출발선은 점점 멀어지고 있다."},
  "기생부하형":{zone:"ZONE B — 공회전 구간",tag:"열심히 하는데 에너지가 없다",desc:"분명히 노력하고 있다. 근데 항상 지쳐 있다.\n뭔가를 시작하려고 하면 이미 에너지가 바닥나 있다.\n\n만나고 나면 이유 없이 무거워지는 사람이 있다.\n알림이 오면 하던 일을 멈추게 된다.\n안 나가도 되는데 눈치 때문에 나가는 모임이 있다.\n\n정작 나를 위한 일을 할 때는 이미 남은 게 없다.",ch:"Ch14, Ch15 — 개방계 / 치명적 취약점이 감지되었습니다",q:"노력이 부족한 게 아니다. 에너지가 엉뚱한 곳으로 새고 있는 것이다."},
  "임계점형":{zone:"ZONE A — 점화 구간",tag:"열심히 하는데 변화가 안 보인다",desc:"분명히 하고 있다. 꾸준히 하고 있다. 근데 달라진 게 없다.\n주변 사람들은 앞으로 가는 것 같은데 나만 제자리인 것 같다.\n\n열심히 한다고 말하는데 보여줄 결과가 없다.\n주변에서 \"그거 돼?\"라고 물어볼 때 대답이 궁색하다.\n\n근데 멈추지는 못하겠다.\n여기서 그만두면 지금까지 한 게 다 사라지는 것 같아서.",ch:"Ch8, Ch9 — 잠열 / 핵비등",q:"변화가 안 보이는 게 실패가 아니다. 끓기 직전이 가장 조용하다."},
  "연쇄반응형":{zone:"ZONE A — 점화 구간",tag:"터졌다. 근데 왜 이렇게 불안하지",desc:"뭔가 되고 있다. 반응이 오고 있다.\n객관적으로 잘 되고 있는데 이상하게 불안하다.\n언제 다시 멈출지 모른다는 생각이 든다.\n\n더 해야 할 것 같다. 더 빠르게 가야 할 것 같다.\n잘 되고 있는데 오히려 예전보다 더 긴장된다.\n번아웃이 오고 있는 것 같은데 멈추면 다 사라질 것 같아서 못 멈추겠다.\n\n잘 되고 있는 게 맞는데, 왜 이렇게 불안한지 모르겠다.",ch:"Ch13 — 카르노 효율",q:"꺼지지 않는 엔진은 없다. 확 끓었다가 확 식어야 다시 폭발한다."},
  "잠열 구간형":{zone:"ZONE C — 잠열 구간",tag:"하고 있는데 왜 아무것도 안 변하는 것 같지",desc:"분명히 하고 있다. 멈추지도 않았다. 근데 달라진 게 없다.\n이게 맞는 건지, 그냥 제자리걸음인 건지 구분이 안 된다.\n\n포기하자니 여기까지 온 게 아깝고, 계속하자니 확신이 없다.\n그냥 묵묵히 하고 있는데 이게 맞는 건지 자꾸 의심된다.\n\n근데 멈추진 않고 있다.\n그게 지금 유일하게 확실한 것이다.",ch:"Ch8 — 잠열",q:"지금 아무것도 안 변하는 것 같다면, 가장 중요한 구간을 지나고 있는 것이다."},
  "감속재형":{zone:"ZONE C — 잠열 구간",tag:"하고 있는데 왜 이렇게 느리지",desc:"방향은 있다. 하고도 있다. 근데 속도가 안 난다.\n결과가 안 보이면 방법을 바꾼다. 바꿨는데 또 안 되면 또 바꾼다.\n\n잘 되고 있는지 자꾸 확인하고 싶어진다. 확인할 때마다 불안해진다.\n이것도 해야 할 것 같고 저것도 해야 할 것 같아서\n동시에 하다 보면 다 느려진다.\n\n문제가 밖에 있는 줄 알았는데,\n사실 내가 내 속도를 늦추고 있었다.",ch:"Ch11, Ch12 — 임계 질량 / 음성 피드백",q:"전부 바꾸려 하지 마라. 가장 큰 것 하나만 없애도 속도는 달라진다."},
  "대포형":{zone:"ZONE C — 잠열 구간",tag:"완벽하게 준비했는데 왜 빗나갔지",desc:"준비를 잘 했다. 계획도 탄탄했다. 이번엔 진짜 될 것 같았다. 근데 안 됐다.\n그래서 다시 처음부터 준비한다.\n\n결과가 나쁘면 계획 자체를 버린다.\n수정하는 게 아니라 새로 시작한다.\n그래서 항상 처음부터 다시 시작하는 느낌이다.\n\n열심히 하고 있는데 왜 이렇게 제자리인지 모르겠다.\n사실 제자리가 아니라 계속 처음으로 돌아오고 있는 것이다.",ch:"Ch12 — 음성 피드백",q:"빗나간 게 실패가 아니다. 수정하지 않는 것이 실패다."},
  "열평형형":{zone:"ZONE D — 고립 구간",tag:"언제부터 이렇게 됐지",desc:"꿈이 있었다. 하고 싶은 게 있었다.\n근데 어느 순간부터 그 얘기를 안 하게 됐다.\n주변 사람들이랑 비슷하게 살고 있다.\n\n뭔가 해보려고 하면 \"그게 돼?\"라는 말이 먼저 들린다.\n어느 순간부터 나도 그 말을 스스로에게 하고 있다.\n\n근데 가끔 그냥 찔린다.\n이렇게 살면 안 될 것 같다는 느낌.",ch:"Ch2, Ch14 — 비가역성 / 개방계",q:"내가 식은 게 아니다. 주변이 나를 식혔다."},
  "고립계형":{zone:"ZONE D — 고립 구간",tag:"혼자 하면 된다고 생각했다",desc:"남한테 기대는 게 싫다. 혼자 할 수 있다고 생각한다. 그래서 혼자 한다.\n혼자 고민하고, 혼자 버티고, 혼자 쌓아간다.\n\n근데 어느 순간 한계가 왔다.\n연결하면 더 빠를 수 있다는 걸 알면서도 연결이 불편하다.\n\n혼자 버티는 게 강한 게 아니라는 걸 알고 있다.\n근데 연결하는 법을 모르겠다.",ch:"Ch14 — 개방계",q:"혼자 만든 건 혼자만큼만 커진다. 연결되는 순간 증폭된다."},
  "활성화에너지 미달형":{zone:"ZONE D — 고립 구간",tag:"시작만 하면 될 것 같은데 시작을 못 하겠다",desc:"하고 싶다. 해야 한다는 것도 안다. 오늘 하려고 했다. 근데 또 못 했다.\n내일은 할 것 같다. 근데 내일도 이 생각을 할 것 같다.\n\n자극을 받으면 당장 할 것 같다.\n불이 붙으면 오늘은 진짜 할 것 같다.\n근데 막상 시작하려고 하면 뭔가 막힌다.\n\n사실 의지 문제가 아니다.\n시작하는 방법이 잘못된 것이다.",ch:"Ch6, Ch7 — 활성화 에너지 / 정지마찰",q:"시작을 못 하는 건 의지가 약한 게 아니다. 첫 발을 너무 크게 내딛으려는 것이다."},
  "미루기형":{zone:"ZONE D — 고립 구간",tag:"나중에 하면 된다고 생각한다",desc:"지금 당장은 아니어도 된다. 나중에 하면 된다.\n조금 더 여유가 생기면, 이것만 끝나면, 다음 달부터 시작하면 된다.\n항상 조건이 있다.\n\n근데 그 나중이 온 적이 없다.\n1년 전에도 나중에 하려고 했다. 지금도 나중을 기다리고 있다.\n\n시간이 해결해줄 거라고 생각했다.\n근데 시간은 아무것도 해결해주지 않는다.",ch:"Ch3 — 비가역성",q:"흘러간 시간은 돌아오지 않는다. 나중은 없다. 지금뿐이다."},
  "요행형":{zone:"ZONE D — 고립 구간",tag:"언젠가 한 방이 있을 거라고 생각한다",desc:"열심히 안 해도 될 것 같다.\n언젠가 기회가 올 것 같다.\n지금 당장 힘들게 하지 않아도 어떻게든 될 것 같다.\n\n주변에 운 좋게 된 사람이 있다. 나도 그럴 수 있을 것 같다.\n근데 그 사람이 보이지 않는 곳에서 얼마나 했는지는 모른다.\n\n한 방을 기다리는 동안 아무것도 쌓이지 않는다.",ch:"Ch4 — 맥스웰의 도깨비",q:"요행은 없다. 보이지 않는 곳에서 쌓은 것만 남는다."},
};

// FIX 1: 유형별 항목 수 계산 (비율 기반 점수)
const typeCount={};
items.forEach(item=>item.types.forEach(t=>{typeCount[t]=(typeCount[t]||0)+1;}));

let on=new Set();
const list=document.getElementById('list');
items.forEach((item,i)=>{
  const el=document.createElement('div');
  el.className='item';
  el.innerHTML=`<div class="box"><svg class="chk" width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg></div><div><div class="item-title">${item.t}</div><div class="item-body">${item.b}</div></div>`;
  el.onclick=()=>{
    if(on.has(i)){on.delete(i);el.classList.remove('on');}
    else{on.add(i);el.classList.add('on');}
    document.getElementById('pf').style.width=Math.min(on.size/8*100,100)+'%';
    document.getElementById('rbtn').disabled=on.size===0;
  };
  list.appendChild(el);
});

function showResult(){
  // FIX 1: 비율 기반 점수 계산 — 항목 수 많은 유형이 유리하지 않도록
  const scores={};
  on.forEach(i=>items[i].types.forEach(t=>{
    scores[t]=(scores[t]||0)+(1/typeCount[t]);
  }));
  const top=Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const d=types[top];
  document.getElementById('rname-h').textContent=top;
  document.getElementById('rzone').textContent=d.zone;
  document.getElementById('rtype').textContent=top;
  document.getElementById('rtag').textContent=d.tag;
  document.getElementById('rdesc').textContent=d.desc;
  document.getElementById('rch').textContent=d.ch;
  document.getElementById('rq').textContent=d.q;
  document.getElementById('quiz').style.display='none';
  const r=document.getElementById('result');
  r.style.display='block';
  window.scrollTo(0,0);
}

function copyR(){
  const t=document.getElementById('rtype').textContent;
  const d=types[t];
  // FIX 2: 공유 텍스트에 Wadiz 링크 추가
  const text=`[청춘℃ 유형 진단]\n나는 ${t}\n"${d.tag}"\n\n${d.q}\n\n👉 ${WADIZ_URL}`;
  navigator.clipboard.writeText(text).then(()=>{
    const b=event.target.closest('.sbtn');
    const o=b.innerHTML;b.innerHTML='✓ 복사됨';
    setTimeout(()=>b.innerHTML=o,2000);
  });
}

function shareR(){
  const t=document.getElementById('rtype').textContent;
  const d=types[t];
  // FIX 2: 공유 텍스트에 Wadiz 링크 추가
  if(navigator.share){
    navigator.share({
      title:'청춘℃ 유형 진단',
      text:`나는 ${t} — "${d.tag}"\n\n${d.q}`,
      url: WADIZ_URL
    });
  } else {
    copyR();
  }
}

function retry(){
  on.clear();
  document.querySelectorAll('.item').forEach(el=>el.classList.remove('on'));
  document.getElementById('pf').style.width='0%';
  document.getElementById('rbtn').disabled=true;
  document.getElementById('result').style.display='none';
  document.getElementById('quiz').style.display='block';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
